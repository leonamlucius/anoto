<button class="add-button" (mouseenter)="showNoteContent()" (mouseleave)="hiddeNoteContent()" (click)="createModal()">
    <span class="material-symbols-outlined">
        add
    </span>
</button>


<div class="colors">
    <button *ngFor="let note of notes" class="note" [style.backgroundColor]="note.color" (click)="selectNote($event)" id="{{note.color}}">
        <span class="material-symbols-outlined">
            
        </span>

    </button>
</div>

<app-modal *ngIf="showModal" (closeModal)="showModal = false"></app-modal>
