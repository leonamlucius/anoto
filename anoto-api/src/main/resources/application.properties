spring.application.name=anoto-api
server.port=8080

# Banco H2 em memória (desenvolvimento)
spring.datasource.url=jdbc:h2:mem:anotodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Console H2 (acessível em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=anoto-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
jwt.expiration=86400000

# Debug
logging.level.org.springframework.security=DEBUG
